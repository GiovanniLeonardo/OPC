<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>OPC Inventory Manager</title>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(12px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased p-4">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-6 mt-4">
            <h1 class="text-3xl font-black tracking-tight text-white uppercase italic">
                OPC<span class="text-blue-500">STOCK</span>
            </h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Inventory Management System</p>
        </div>

        <div id="inventory-list" class="space-y-6 pb-20">
            </div>
    </div>

    <script>
        // Data from your Google Sheet
        const inventoryData = [
            { name: "Cassette", initial: 16 },
            { name: "Perfusate", initial: 19 }
        ];

        function getStatus(stock) {
            if (stock > 10) return { label: "In Stock", color: "text-green-400", border: "border-green-500/30", bg: "bg-green-500/10" };
            if (stock > 0) return { label: "Low Stock", color: "text-yellow-400", border: "border-yellow-500/30", bg: "bg-yellow-500/10" };
            return { label: "Out of Stock", color: "text-red-500", border: "border-red-500/30", bg: "bg-red-500/10" };
        }

        function calculateStock(index) {
            const addedInput = document.getElementById(`add-${index}`);
            const usedInput = document.getElementById(`used-${index}`);
            
            const addedVal = parseFloat(addedInput.value) || 0;
            const usedVal = parseFloat(usedInput.value) || 0;
            const item = inventoryData[index];
            
            // Final Math
            const currentStock = (item.initial + addedVal) - usedVal;
            const finalStock = Math.max(0, currentStock);

            // Update UI
            const stockDisplay = document.getElementById(`stock-${index}`);
            stockDisplay.innerText = finalStock;

            // Update Status Badge
            const statusInfo = getStatus(finalStock);
            const statusEl = document.getElementById(`status-${index}`);
            statusEl.innerText = statusInfo.label;
            statusEl.className = `px-3 py-1 rounded-full text-[10px] font-bold uppercase ${statusInfo.color} ${statusInfo.bg} border ${statusInfo.border}`;
        }

        function renderApp() {
            const container = document.getElementById('inventory-list');
            inventoryData.forEach((item, index) => {
                const statusInfo = getStatus(item.initial);
                container.innerHTML += `
                    <div class="glass border border-slate-700 rounded-[2rem] p-6 shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-2xl font-black text-white tracking-tight">${item.name}</h3>
                            <span id="status-${index}" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${statusInfo.color} ${statusInfo.bg} border ${statusInfo.border}">
                                ${statusInfo.label}
                            </span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2">Restock (+)</label>
                                <input type="number" id="add-${index}" oninput="calculateStock(${index})" placeholder="0" 
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-xl text-white outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                <label class="block text-[10px] font-bold text-red-400 uppercase mb-2">Used (-)</label>
                                <input type="number" id="used-${index}" oninput="calculateStock(${index})" placeholder="0" 
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-xl text-white outline-none focus:ring-2 focus:ring-red-500">
                            </div>
                        </div>

                        <div class="flex justify-between items-end px-2">
                            <div>
                                <p class="text-[10px] font-bold text-slate-500 uppercase">Original Sheet Value</p>
                                <p class="text-lg font-bold text-slate-300">${item.initial}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold text-slate-500 uppercase">Live In Stock</p>
                                <p id="stock-${index}" class="text-5xl font-black text-white leading-none">${item.initial}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        renderApp();
    </script>
</body>
</html>
